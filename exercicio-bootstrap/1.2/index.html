<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Bootstrap</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body{
      background:#111;
    }

    .box{
      background:#c7d3db;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:20px;
      font-size:24px;
    }
  </style>
</head>
<body>

  <div class="container mt-5">

    <!-- 12 colunas -->
    <div class="row">
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
      <div class="col-1"><div class="box">1</div></div>
    </div>

    <!-- col-2 -->
    <div class="row">
      <div class="col-2"><div class="box">2</div></div>
      <div class="col-2"><div class="box">2</div></div>
      <div class="col-2"><div class="box">2</div></div>
      <div class="col-2"><div class="box">2</div></div>
      <div class="col-2"><div class="box">2</div></div>
      <div class="col-2"><div class="box">2</div></div>
    </div>

    <!-- col-3 -->
    <div class="row">
      <div class="col-3"><div class="box">3</div></div>
      <div class="col-3"><div class="box">3</div></div>
      <div class="col-3"><div class="box">3</div></div>
      <div class="col-3"><div class="box">3</div></div>
    </div>

    <!-- col-4 -->
    <div class="row">
      <div class="col-4"><div class="box">4</div></div>
      <div class="col-4"><div class="box">4</div></div>
      <div class="col-4"><div class="box">4</div></div>
    </div>

    <!-- col-6 -->
    <div class="row">
      <div class="col-6"><div class="box">6</div></div>
      <div class="col-6"><div class="box">6</div></div>
    </div>

    <!-- 4 + 8 -->
    <div class="row">
      <div class="col-4"><div class="box">4</div></div>
      <div class="col-8"><div class="box">8</div></div>
    </div>

    <!-- 12 -->
    <div class="row">
      <div class="col-12"><div class="box">12</div></div>
    </div>

  </div>

</body>
</html>
